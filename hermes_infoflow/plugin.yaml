# Hermes Agent plugin manifest for the Infoflow (如流) channel adapter.
#
# IMPORTANT: `name` MUST equal:
#   1. The entry-point key in pyproject.toml:
#      [project.entry-points."hermes_agent.plugins"] infoflow = "hermes_infoflow"
#   2. The `name` argument passed to ctx.register_platform(name="infoflow", ...)
#      inside hermes_infoflow/adapter.py.
# Otherwise hermes treats entry-point and directory installs as two distinct
# plugins and they may shadow each other unpredictably.
#
# Layout note: hermes-agent's directory loader requires ``__init__.py`` at the
# plugin dir root (``hermes_cli/plugins.py::_load_directory_module``). The repo
# keeps the source nested in ``hermes_infoflow/`` so the same code also serves
# the entry-point install. ``scripts/deploy.sh`` flattens the layout at deploy
# time — see ``tests/test_deploy_layout.py`` for the contract. There is NO
# ``entry_module`` field hermes-agent reads; pointing at a nested package via
# the manifest would not help.
manifest_version: 1
name: infoflow
label: Infoflow (如流)
kind: platform
version: 0.2.0
description: >
  Baidu Infoflow (如流) channel plugin for Hermes Agent.
  Receives messages via webhook (AES-ECB encrypted) and sends via REST API.
author: chengbo05 <chengbo05@baidu.com>

# ``requires_env`` / ``optional_env`` are surfaced by hermes_cli/config.py's
# platform-plugin env var injector in the `hermes config` setup wizard —
# ONLY when this plugin is loaded as a directory plugin (paths A / B-extract / D).
# Entry-point installs (paths B-pip / C) do not read plugin.yaml, so users on
# those paths must export INFOFLOW_* manually. See README for details.
requires_env:
  - name: INFOFLOW_CHECK_TOKEN
    description: "Infoflow check token (used for echostr signature verification)"
    prompt: "Infoflow checkToken"
    password: true
  - name: INFOFLOW_ENCODING_AES_KEY
    description: "Infoflow EncodingAESKey (base64URL-safe, 16/24/32 raw bytes)"
    prompt: "Infoflow EncodingAESKey"
    password: true
  - name: INFOFLOW_APP_KEY
    description: "Infoflow app key (token endpoint identity)"
    prompt: "Infoflow appKey"
    password: false
  - name: INFOFLOW_APP_SECRET
    description: "Infoflow app secret (raw; will be MD5'd lowercase hex)"
    prompt: "Infoflow appSecret"
    password: true
  - name: INFOFLOW_API_HOST
    description: "Infoflow API host root, e.g. https://api.infoflow.example.com"
    prompt: "Infoflow API host (https://...)"
    password: false

optional_env:
  - name: INFOFLOW_ADMIN_USER
    description: "Admin user's uuapName — only this user has full access to sensitive tools"
    prompt: "Admin user uuapName"
    password: false
  - name: INFOFLOW_APP_AGENT_ID
    description: "Infoflow agent ID (required for private-chat recall)"
    prompt: "Infoflow appAgentId"
    password: false
  - name: INFOFLOW_ROBOT_NAME
    description: "Bot display name used to detect @-mentions in groups"
    prompt: "Bot display name"
    password: false
  - name: INFOFLOW_PORT
    description: "Webhook listen port (default 8646)"
    prompt: "Webhook port"
    password: false
  - name: INFOFLOW_HOST
    description: "Webhook bind host (default 0.0.0.0)"
    prompt: "Webhook bind host"
    password: false
  - name: INFOFLOW_WEBHOOK_PATH
    description: "Webhook URL path (default /webhook/infoflow)"
    prompt: "Webhook path"
    password: false
  - name: INFOFLOW_HOME_CHANNEL
    description: "Default delivery target for cron jobs (uuapName or group:<id>)"
    prompt: "Home channel target"
    password: false
  - name: INFOFLOW_HOME_CHANNEL_NAME
    description: "Display name for the home channel"
    prompt: "Home channel display name"
    password: false
  - name: INFOFLOW_REPLY_MODE
    description: "Group reply mode: ignore / record / mention-only / mention-and-watch (default) / proactive"
    prompt: "Reply mode"
    password: false
  - name: INFOFLOW_REQUIRE_MENTION
    description: "If true, only respond in groups when bot is @-mentioned (default true)"
    prompt: "Require mention? (true/false)"
    password: false
  - name: INFOFLOW_WATCH_MENTIONS
    description: "Comma-separated names; @-mentioning any of them triggers the bot in mention-and-watch mode"
    prompt: "Watch mentions (comma-separated)"
    password: false
  - name: INFOFLOW_WATCH_REGEX
    description: "Regex patterns triggering the bot when matched in message text. Separate multiple patterns with newlines or '|||' (single '|' is preserved for regex alternation)."
    prompt: "Watch regex patterns (newline / |||-separated)"
    password: false
  - name: INFOFLOW_FOLLOW_UP
    description: "Enable follow-up replies after bot responds (default true). When true, the bot continues to engage messages in the same group within the follow-up window."
    prompt: "Follow-up enabled? (true/false)"
    password: false
  - name: INFOFLOW_FOLLOW_UP_WINDOW
    description: "Follow-up window in seconds after last bot reply (default 300)"
    prompt: "Follow-up window seconds"
    password: false
  - name: INFOFLOW_GROUPS
    description: "Per-group config overrides as JSON, keyed by group ID. Each entry can override reply_mode / watch_mentions / watch_regex / follow_up / follow_up_window / system_prompt."
    prompt: "Per-group config (JSON)"
    password: false
  - name: INFOFLOW_ALLOWED_USERS
    description: "Comma-separated uuapNames allowed to talk to the bot"
    prompt: "Allowed users (comma-separated)"
    password: false
  - name: INFOFLOW_ALLOW_ALL_USERS
    description: "Allow all users to talk to the bot (dev only)"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: HERMES_STATE_DIR
    description: "Override the directory holding hermes state (sent-messages.db etc.). Defaults to ~/.hermes/state."
    prompt: "Hermes state directory"
    password: false
