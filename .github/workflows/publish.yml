name: Publish to PyPI

on:
  push:
    tags:
      - "*"

jobs:
  publish-main:
    name: Publish hermes-infoflow
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-tools:
    name: Publish hermes-infoflow-tools
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    needs: publish-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        working-directory: tools/hermes-infoflow-tools
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: tools/hermes-infoflow-tools/dist/
